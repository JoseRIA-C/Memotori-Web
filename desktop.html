<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Memotori | Categoría</title>

  <!-- Fuente -->
  <link href="https://fonts.googleapis.com/css2?family=Holtwood+One+SC&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/desktop.css">
</head>

<body>

<header class="topbar">
  <div class="logo">
    <img src="imagenes/logo.png" alt="Memotori">
  </div>
</header>

<main class="contenido">

  <!-- TITULO -->
  <h2 class="titulo" id="categoryTitle"></h2>

  <!-- DESCRIPCIÓN -->
  <p class="descripcion" id="categoryDescription"></p>

  <hr>

  <!-- ===== ZONA DE JUEGO (GRID) ===== -->
  <div class="zona-juego">

    <!-- COLUMNA IZQUIERDA: TARJETAS -->
    <div class="cards-preview" id="cardsZone">
      <!-- aquí se insertan las flip cards -->
    </div>

    <!-- COLUMNA DERECHA: MODOS -->
    <div class="modos">
      <div class="modo-btn">
        <div class="modo-icon"></div>
        Opción múltiple
      </div>

      <div class="modo-btn">
        <div class="modo-icon"></div>
        Verdadero o Falso
      </div>

      <div class="modo-btn">
        <div class="modo-icon"></div>
        Test abierto
      </div>

      <div class="modo-btn">
        <div class="modo-icon"></div>
        Memorizar
      </div>
    </div>

  </div>

</main>

<script src="js/desktop.js"></script>

</body>
</html>
